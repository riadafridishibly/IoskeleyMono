# ============================================================
# Three independent build plans so all widths can be installed
# side by side under distinct family names:
#   - Ioskeley Mono                (Normal)
#   - Ioskeley Mono SemiCondensed  (SemiCondensed)
#   - Ioskeley Mono Condensed      (Condensed)
# Build any subset with e.g.:
#   bun run build contents::IoskeleyMono
#   bun run build contents::IoskeleyMonoSemiCondensed
#   bun run build contents::IoskeleyMonoCondensed
# ============================================================

# ============================================================
# PLAN 1 · Ioskeley Mono (Normal width)
# ============================================================

[buildPlans.IoskeleyMono]
family = "Ioskeley Mono"
spacing = "term"
serifs = "sans"
noCvSs = true
exportGlyphNames = true

