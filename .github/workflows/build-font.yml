name: Build and Release Font

# Triggered by version tags (e.g. v2.0.0)
# To release: git tag v2.0.0 && git push origin v2.0.0
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v2.0.0)"
        required: false
        default: "v0.0.0-test"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout Iosevka source
        uses: actions/checkout@v4
        with:
          repository: be5invis/Iosevka
          path: iosevka-src
          fetch-depth: 1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ttfautohint python3 fontforge

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build fonts
        run: |
          cp private-build-plans.toml iosevka-src/
          cd iosevka-src
          npm install
          npm run build -- \
            contents::IoskeleyMono \
            contents::IoskeleyMonoSemiCondensed \
            contents::IoskeleyMonoCondensed

      - name: Verify build output
        run: |
          for plan in IoskeleyMono IoskeleyMonoSemiCondensed IoskeleyMonoCondensed; do
            for sub in TTF TTF-Unhinted; do
              if [ ! -d "iosevka-src/dist/$plan/$sub" ]; then
                echo "Missing dist/$plan/$sub"
                exit 1
              fi
            done
          done

      - name: Download Nerd Fonts patcher
        run: |
          curl -sL "$(gh api repos/ryanoasis/nerd-fonts/releases/latest --jq '.assets[] | select(.name == "FontPatcher.zip") | .browser_download_url')" -o FontPatcher.zip
          unzip -q FontPatcher.zip -d nerd-fonts-patcher
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Each width is its own build plan with its own family name, so every
      # dist dir already contains exactly one width — no filename filtering
      # needed. The Nerd Fonts patcher appends "Nerd Font" to the family
      # name it reads from each file, which keeps all six final families
      # (plain + Nerd Font × 3 widths) distinct and installable side by side.
      - name: Patch fonts with Nerd Font glyphs
        run: |
          PATCHER="nerd-fonts-patcher/font-patcher"
          for pair in "IoskeleyMono:Normal" "IoskeleyMonoSemiCondensed:SemiCondensed" "IoskeleyMonoCondensed:Condensed"; do
            plan="${pair%%:*}"
            label="${pair##*:}"
            mkdir -p "patched-fonts/$label"
            for font in "iosevka-src/dist/$plan/TTF"/*.ttf; do
              fontforge -script "$PATCHER" "$font" --complete --careful --outputdir "patched-fonts/$label"
            done
          done

      - name: Package TTF archives per width
        run: |
          for pair in "IoskeleyMono:Normal" "IoskeleyMonoSemiCondensed:SemiCondensed" "IoskeleyMonoCondensed:Condensed"; do
            plan="${pair%%:*}"
            label="${pair##*:}"
            mkdir -p "pkg-ttf/$label/Hinted" "pkg-ttf/$label/Unhinted"
            cp "iosevka-src/dist/$plan/TTF"/*.ttf "pkg-ttf/$label/Hinted/"
            cp "iosevka-src/dist/$plan/TTF-Unhinted"/*.ttf "pkg-ttf/$label/Unhinted/"
            (cd "pkg-ttf/$label" && zip -r "../../IoskeleyMono-$label.zip" .)
          done

      - name: Package Nerd Font archives per width
        run: |
          for label in Normal SemiCondensed Condensed; do
            (cd "patched-fonts/$label" && zip -r "../../IoskeleyMono-NerdFont-$label.zip" .)
          done

      - name: Set release version
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: "Ioskeley Mono ${{ steps.vars.outputs.tag }}"
          body: |
            ## Ioskeley Mono ${{ steps.vars.outputs.tag }}

            Each width ships as its own font family, so all three widths — plain and Nerd Font patched — can be installed side by side without family-name collisions.

            **Family names**
            - Plain — `Ioskeley Mono`, `Ioskeley Mono SemiCondensed`, `Ioskeley Mono Condensed`
            - Nerd Font — same names with `Nerd Font` appended

            **For Desktop Users:**
            - `IoskeleyMono-Normal.zip` — Normal width, all 10 weights. Best starting point for most users.
            - `IoskeleyMono-SemiCondensed.zip` — Slightly narrower. Great for fitting more code on screen.
            - `IoskeleyMono-Condensed.zip` — Maximum density.

            Each zip includes a `Hinted/` and `Unhinted/` folder — use Hinted on standard screens, Unhinted on high-DPI/Retina.

            **For Terminal Users (Nerd Font):**
            - `IoskeleyMono-NerdFont-Normal.zip` — Normal width, patched with the full Nerd Font glyph set.
            - `IoskeleyMono-NerdFont-SemiCondensed.zip` — Semi Condensed, Nerd Font patched.
            - `IoskeleyMono-NerdFont-Condensed.zip` — Condensed, Nerd Font patched.

            ---
            Got a bug or idea? PRs and issues are welcome — this is just a config on top of Iosevka, easy to contribute. 🙌
          files: |
            IoskeleyMono-Normal.zip
            IoskeleyMono-SemiCondensed.zip
            IoskeleyMono-Condensed.zip
            IoskeleyMono-NerdFont-Normal.zip
            IoskeleyMono-NerdFont-SemiCondensed.zip
            IoskeleyMono-NerdFont-Condensed.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}