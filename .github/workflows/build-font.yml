name: Build and Release Font

# Triggered by version tags (e.g. v2.0.0)
# To release: git tag v2.0.0 && git push origin v2.0.0
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v2.0.0)"
        required: false
        default: "v0.0.0-test"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout Iosevka source
        uses: actions/checkout@v4
        with:
          repository: be5invis/Iosevka
          path: iosevka-src
          fetch-depth: 1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ttfautohint python3 fontforge

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build font
        run: |
          cp private-build-plans.toml iosevka-src/
          cd iosevka-src
          npm install
          npm run build -- contents::IoskeleyMono

      - name: Verify build output
        run: |
          if [ ! -d "iosevka-src/dist/IoskeleyMono/TTF" ] || [ ! -d "iosevka-src/dist/IoskeleyMono/WOFF2" ]; then
            echo "Build output directories not found!"
            exit 1
          fi

      - name: Download Nerd Fonts patcher
        run: |
          curl -sL "$(gh api repos/ryanoasis/nerd-fonts/releases/latest --jq '.assets[] | select(.name == "FontPatcher.zip") | .browser_download_url')" -o FontPatcher.zip
          unzip -q FontPatcher.zip -d nerd-fonts-patcher
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Iosevka encodes the width inside the weight name:
      #   Normal        → IoskeleyMono-{Weight}.ttf
      #   SemiCondensed → IoskeleyMono-SemiCondensed{Weight}.ttf
      #   Condensed     → IoskeleyMono-Condensed{Weight}.ttf
      - name: Patch fonts with Nerd Font glyphs
        run: |
          mkdir -p patched-fonts/Normal patched-fonts/SemiCondensed patched-fonts/Condensed
          DIST="iosevka-src/dist/IoskeleyMono/TTF"
          PATCHER="nerd-fonts-patcher/font-patcher"

          for font in "$DIST"/IoskeleyMono-SemiCondensed*.ttf; do
            fontforge -script "$PATCHER" "$font" --complete --careful --outputdir patched-fonts/SemiCondensed
          done

          for font in "$DIST"/IoskeleyMono-Condensed*.ttf; do
            [[ "$font" == *SemiCondensed* ]] && continue
            fontforge -script "$PATCHER" "$font" --complete --careful --outputdir patched-fonts/Condensed
          done

          for font in "$DIST"/IoskeleyMono-*.ttf; do
            [[ "$font" == *Condensed* ]] && continue
            fontforge -script "$PATCHER" "$font" --complete --careful --outputdir patched-fonts/Normal
          done

      - name: Package TTF archives per width
        run: |
          DIST="iosevka-src/dist/IoskeleyMono"
          mkdir -p pkg-ttf/Normal/Hinted pkg-ttf/Normal/Unhinted
          mkdir -p pkg-ttf/SemiCondensed/Hinted pkg-ttf/SemiCondensed/Unhinted
          mkdir -p pkg-ttf/Condensed/Hinted pkg-ttf/Condensed/Unhinted

          # SemiCondensed
          cp "$DIST"/TTF/IoskeleyMono-SemiCondensed*.ttf pkg-ttf/SemiCondensed/Hinted/
          cp "$DIST"/TTF-Unhinted/IoskeleyMono-SemiCondensed*.ttf pkg-ttf/SemiCondensed/Unhinted/

          # Condensed
          for font in "$DIST"/TTF/IoskeleyMono-Condensed*.ttf; do
            [[ "$font" == *SemiCondensed* ]] && continue
            cp "$font" pkg-ttf/Condensed/Hinted/
          done
          for font in "$DIST"/TTF-Unhinted/IoskeleyMono-Condensed*.ttf; do
            [[ "$font" == *SemiCondensed* ]] && continue
            cp "$font" pkg-ttf/Condensed/Unhinted/
          done

          # Normal
          for font in "$DIST"/TTF/IoskeleyMono-*.ttf; do
            [[ "$font" == *Condensed* ]] && continue
            cp "$font" pkg-ttf/Normal/Hinted/
          done
          for font in "$DIST"/TTF-Unhinted/IoskeleyMono-*.ttf; do
            [[ "$font" == *Condensed* ]] && continue
            cp "$font" pkg-ttf/Normal/Unhinted/
          done

          cd pkg-ttf/Normal && zip -r ../../IoskeleyMono-Normal.zip . && cd ../..
          cd pkg-ttf/SemiCondensed && zip -r ../../IoskeleyMono-SemiCondensed.zip . && cd ../..
          cd pkg-ttf/Condensed && zip -r ../../IoskeleyMono-Condensed.zip . && cd ../..

      - name: Package Nerd Font archives per width
        run: |
          cd patched-fonts/Normal && zip -r ../../IoskeleyMono-NerdFont-Normal.zip . && cd ../..
          cd patched-fonts/SemiCondensed && zip -r ../../IoskeleyMono-NerdFont-SemiCondensed.zip . && cd ../..
          cd patched-fonts/Condensed && zip -r ../../IoskeleyMono-NerdFont-Condensed.zip . && cd ../..

      - name: Package Web archive
        run: |
          cd iosevka-src/dist/IoskeleyMono
          zip -r ../../../IoskeleyMono-Web.zip WOFF2 WOFF2-Unhinted

      - name: Set release version
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: "Ioskeley Mono ${{ steps.vars.outputs.tag }}"
          body: |
            ## Ioskeley Mono ${{ steps.vars.outputs.tag }}

            **For Desktop Users:**
            - `IoskeleyMono-Normal.zip` — Normal width, all 10 weights. Best starting point for most users.
            - `IoskeleyMono-SemiCondensed.zip` — Slightly narrower. Great for fitting more code on screen.
            - `IoskeleyMono-Condensed.zip` — Maximum density. Each zip includes a `Hinted/` and `Unhinted/` folder — use Hinted on standard screens, Unhinted on high-DPI/Retina.

            **For Terminal Users (Nerd Font):**
            - `IoskeleyMono-NerdFont-Normal.zip` — Normal width, patched with the full Nerd Font glyph set.
            - `IoskeleyMono-NerdFont-SemiCondensed.zip` — Semi Condensed, Nerd Font patched.
            - `IoskeleyMono-NerdFont-Condensed.zip` — Condensed, Nerd Font patched.

            **For Web Developers:**
            - `IoskeleyMono-Web.zip` — All WOFF2 files, hinted and unhinted, all widths and weights.

            ---
            Got a bug or idea? PRs and issues are welcome — this is just a config on top of Iosevka, easy to contribute. 🙌
          files: |
            IoskeleyMono-Normal.zip
            IoskeleyMono-SemiCondensed.zip
            IoskeleyMono-Condensed.zip
            IoskeleyMono-NerdFont-Normal.zip
            IoskeleyMono-NerdFont-SemiCondensed.zip
            IoskeleyMono-NerdFont-Condensed.zip
            IoskeleyMono-Web.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}